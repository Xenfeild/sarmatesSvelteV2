# Configuration Nginx pour sarmates-music.com
# Fichier à placer sur le VPS : /etc/nginx/sites-available/sarmates-music.com
# Puis : sudo ln -s /etc/nginx/sites-available/sarmates-music.com /etc/nginx/sites-enabled/
# SSL géré par Certbot : sudo certbot --nginx -d sarmates-music.com -d www.sarmates-music.com

server {
    listen 80;
    server_name sarmates-music.com www.sarmates-music.com;
    # Certbot redirige automatiquement vers HTTPS

    # Frontend SvelteKit (port 3001)
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Backend Express API (port 3000)
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Emails via backend
    location /send-email {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Images uploadées
    location /uploads/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        # Cache navigateur 30 jours pour les images
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Sécurité : masquer la version Nginx
    server_tokens off;

    # Limite de taille des uploads (images)
    client_max_body_size 10M;
}
